# Troque pelo nome real da sua app no Fly.io
app = "luxus-demandas-api"
primary_region = "gru"

[build]
  dockerfile = "backend-csharp/Dockerfile"

[env]
  PORT = "8080"
  NODE_BACKEND_PORT = "5000"
  NODE_BACKEND_PATH = "/app/node-backend"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "10s"
