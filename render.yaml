services:
  - type: web
    name: luxus-demandas-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NODE_BACKEND_PORT
        value: 5000
      - key: NODE_BACKEND_PATH
        value: /app/node-backend
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: REFRESH_EXPIRES_IN
        value: 365d
      - key: SUPABASE_STORAGE_BUCKET
        value: demandas-anexos
      - key: OPENAI_API_KEY
        sync: false
