services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luxus-demandas-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8080
      NODE_BACKEND_PORT: 5000
      NODE_BACKEND_PATH: /app/node-backend
    expose:
      - "8080"

  caddy:
    image: caddy:2.8-alpine
    container_name: luxus-demandas-caddy
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_DOMAIN: ${API_DOMAIN}
      CADDY_EMAIL: ${CADDY_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
